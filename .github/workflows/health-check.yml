name: Periodic health check

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

jobs:
  health_check:
    runs-on: ubuntu-latest

    steps:
      - name: Check deployed application
        uses: Jtalk/url-health-check-action@v4
        with:
          url: https://fullstack-hy-cicd.fly.dev/health
