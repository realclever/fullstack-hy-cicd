# fly.toml app configuration file generated for fullstack-hy-cicd on 2026-07-19T19:13:39+03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'fullstack-hy-cicd'
primary_region = 'arn'

[build]

[env]
  PORT = "5001"

[processes]
  app = "node app.js"

[http_service]
  internal_port = 5001
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
